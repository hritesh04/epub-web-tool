services:
  postgres:
    image: postgres:15-alpine
    container_name: epub-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - epub-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: epub-mq
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - epub-network

  minio:
    image: minio/minio:latest
    container_name: epub-s3
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - epub-network

  openobserve:
    image: openobserve/openobserve:latest
    container_name: epub-otel
    environment:
      ZO_ROOT_USER_EMAIL: root@example.com
      ZO_ROOT_USER_PASSWORD: password
      ZO_DATA_TYPE: local
    ports:
      - "5080:5080"
    volumes:
      - openobserve_data:/data
    networks:
      - epub-network

networks:
  epub-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  openobserve_data: